; PlatformIO Project Configuration File
; ESP32-CYD / ESP32-2432S028(R) — ILI9341 240x320 + XPT2046 (ESP32-WROOM-32, not ESP32-S3)
;
; Pick ONE env to match YOUR board’s USB layout (colors/orientation differ):
;   • env:cyd  OR  env:2432s028r  — single Micro-USB CYD / typical “2432S028R” shop listings
;   • env:cyd2usb                 — dual port: USB-C + Micro-USB (“CYD2USB”)
; Wrong env → wrong BGR/RGB + mirror → unusable or wrong-looking picture (still “a screen”, but broken).
; After changing env: full rebuild, upload, and uploadfs with the SAME env name.

[env]
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.37
board = esp32dev
framework = espidf
board_build.partitions = partitions.csv
monitor_speed = 115200

build_flags = 
    -Iinclude
    -DUSE_INTERNAL_RAM
    -DUMAC_MEMSIZE=128
    -DDISP_WIDTH=240
    -DDISP_HEIGHT=320
    -DMUSASHI_CNF=\"m68kconf.h\"
    -DENABLE_DASM=0
    ; CYD Display settings
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    ; Touch screen pins
    -DTOUCH_MOSI=32
    -DTOUCH_MISO=39
    -DTOUCH_CLK=25
    -DTOUCH_CS=33

[env:cyd2usb]
build_flags =
	${env.build_flags}
	-DCYD_MIRROR_DISPLAY
	-DCYD_SPI_CLOCK_HZ=60000000
	-DCYD_RGB_ORDER=LCD_RGB_ELEMENT_ORDER_BGR

[env:cyd]
build_flags =
	${env.build_flags}
	-DCYD_MIRROR_DISPLAY
	; 40 MHz = conservative; see env:2432s028r_fast for less “flashing” (strip updates + SPI speed)
	-DCYD_SPI_CLOCK_HZ=40000000
	-DCYD_RGB_ORDER=LCD_RGB_ELEMENT_ORDER_RGB

; Same as cyd / 2432s028r but 80 MHz TFT SPI — snappier refresh; if you see glitches, use env:cyd
[env:2432s028r_fast]
build_flags =
	${env.build_flags}
	-DCYD_MIRROR_DISPLAY
	-DCYD_SPI_CLOCK_HZ=80000000
	-DCYD_RGB_ORDER=LCD_RGB_ELEMENT_ORDER_RGB

; Alias for ESP32-2432S028R resistive-touch boards (same pins as env:cyd — micro-USB style CYD)
[env:2432s028r]
extends = env:cyd
